<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VIT GPA Calculator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #ffc1cc, #ffdee9);
      padding: 20px;
      margin: 0;
      position: relative;
    }

    .animated-bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .bubble {
      position: absolute;
      bottom: -100px;
      width: 40px; height: 40px;
      background: rgba(255, 182, 193, 0.5);
      border-radius: 50%;
      animation: rise 20s infinite ease-in;
    }

    .bubble:nth-child(2) { left: 20%; width: 60px; height: 60px; animation-duration: 25s; }
    .bubble:nth-child(3) { left: 40%; width: 30px; height: 30px; animation-duration: 18s; }
    .bubble:nth-child(4) { left: 60%; width: 50px; height: 50px; animation-duration: 22s; }
    .bubble:nth-child(5) { left: 80%; width: 40px; height: 40px; animation-duration: 20s; }

    @keyframes rise {
      0% { transform: translateY(0); opacity: 0.5; }
      100% { transform: translateY(-1200px); opacity: 0; }
    }

    h1 {
      text-align: center;
      color: #d63384;
      font-size: 3em;
      margin-bottom: 20px;
      text-shadow: 2px 2px #fff0f5;
      position: relative;
      z-index: 1;
    }

    .scroll-animate {
      opacity: 0;
      transform: translateY(50px);
      transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }

    .scroll-animate.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .container {
      background: #fff0f5;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      padding: 30px;
      max-width: 800px;
      margin: auto;
      perspective: 1000px;
      transform-style: preserve-3d;
      position: relative;
      z-index: 1;
    }

    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      min-width: 600px;
    }

    th, td {
      padding: 12px;
      text-align: center;
      white-space: nowrap;
    }

    select, input[type="number"] {
      padding: 8px;
      border-radius: 10px;
      border: 1px solid #d63384;
      font-size: 1em;
      background-color: #ffe3ec;
    }

    input[type="number"] {
      width: 60px;
    }

    button {
      display: inline-block;
      margin: 10px 10px 0 0;
      padding: 12px 25px;
      background-color: #d63384;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1em;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      background-color: #ff69b4;
    }

    /* Clear Progress button distinct style */
    button.clear-btn {
      background-color: #dc3545;
    }
    button.clear-btn:hover {
      background-color: #b02a37;
    }

    #result {
      text-align: center;
      font-size: 1.5em;
      color: #d63384;
      font-weight: bold;
    }

    .image-section {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
    }

    .image-section img {
      width: 120px;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    /* Dark mode styles */
    body.dark-mode {
      background: linear-gradient(to right, #2c2c2c, #1a1a1a);
      color: #f0f0f0;
    }
    body.dark-mode h1 {
      color: #ffb6c1;
      text-shadow: 2px 2px #333;
    }
    body.dark-mode .container {
      background: #333;
      box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
    }
    body.dark-mode select,
    body.dark-mode input[type="number"] {
      background-color: #444;
      color: #fff;
      border: 1px solid #ffb6c1;
    }
    body.dark-mode button {
      background-color: #ff69b4;
    }
    body.dark-mode button:hover {
      background-color: #d63384;
    }
    body.dark-mode #result {
      color: #ffb6c1;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2em; }
      .container { padding: 20px; }
      button { width: 100%; margin: 10px 0; }
      th, td { padding: 8px 6px; font-size: 0.85em; }
      input[type="number"] { width: 45px; }
      select { font-size: 0.9em; }
    }
  </style>
</head>
<body>

              </select>

            <td><input type="number" min="1" value="3" /></td>
            <td><button onclick="deleteRow(this)">Delete</button></td>

    <button onclick="saveProgress()">Save Progress</button>
    <button onclick="loadProgress()">Load Progress</button>
    <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
    <button class="clear-btn" onclick="clearProgress()">Clear Progress</button>

    <div id="result"></div>
  </div>
